[project]
name = "agent-kit-skill-link"
version = "0.1.0"
description = "Skill linking toolkit for agent-kit."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "questionary>=2.0,<3.0",
    "typer>=0.12,<1.0",
]

[project.scripts]
agent-kit-plugin = "agent_kit_skill_link.plugin_cli:main"

[build-system]
requires = ["hatchling>=1.27,<2.0"]
build-backend = "hatchling.build"
